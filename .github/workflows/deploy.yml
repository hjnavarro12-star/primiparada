name: Deploy to Subdomain

on:
  push:
    branches:
      - production
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run build

      # Empaquetar frontend en un tar para subida limpia
      - name: Package frontend
        run: |
          cd dist/primiparada/browser
          tar -czf /tmp/frontend.tar.gz .

      # Subir tar al servidor
      - name: Upload frontend archive
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "/tmp/frontend.tar.gz"
          target: "/tmp"
          strip_components: 1

      # Desplegar: extraer frontend en DEPLOY_PATH, setup backend, restart
      - name: Deploy and restart
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            DEPLOY_PATH="${{ secrets.SSH_DEPLOY_PATH }}"

            # Limpiar frontend anterior (NO tocar server/)
            find "$DEPLOY_PATH" -maxdepth 1 -type f -delete
            rm -rf "$DEPLOY_PATH/assets" "$DEPLOY_PATH/chunk-"* "$DEPLOY_PATH/media"

            # Extraer frontend directamente en DEPLOY_PATH
            tar -xzf /tmp/frontend.tar.gz -C "$DEPLOY_PATH"
            rm -f /tmp/frontend.tar.gz

            # Verificar que index.html existe
            if [ ! -f "$DEPLOY_PATH/index.html" ]; then
              echo "ERROR: index.html no encontrado en $DEPLOY_PATH"
              exit 1
            fi

            echo "Frontend desplegado: $(ls $DEPLOY_PATH/index.html)"

            # Fijar permisos para Nginx (www-data)
            chown -R primiparada:www-data "$DEPLOY_PATH"
            chmod -R 755 "$DEPLOY_PATH"
            find "$DEPLOY_PATH" -type f -exec chmod 644 {} \;

            # Backend: instalar dependencias si hay server/
            if [ -d "$DEPLOY_PATH/server" ]; then
              cd "$DEPLOY_PATH/server"
              npm install --production || true
            fi

            # Reiniciar servicio backend (systemd)
            sudo systemctl restart primiparada.service || true

            echo "Deploy completado exitosamente."
