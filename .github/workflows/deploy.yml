name: Deploy to Subdomain

on:
  push:
    branches:
      - production
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run build

      # Frontend: va directo a DEPLOY_PATH (Nginx apunta ahí)
      - name: Prepare frontend files
        run: |
          mkdir -p deploy-frontend
          cp -r dist/primiparada/browser/* deploy-frontend/

      - name: Deploy frontend
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "deploy-frontend/*"
          target: ${{ secrets.SSH_DEPLOY_PATH }}
          strip_components: 1
          rm: true
          overwrite: true

      # Backend: va a DEPLOY_PATH/server
      - name: Deploy backend
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "server/src,server/package.json,server/package-lock.json,server/schema.sql"
          target: ${{ secrets.SSH_DEPLOY_PATH }}/server
          strip_components: 1
          rm: true

      # Setup backend y reiniciar servicio systemd
      - name: Setup and restart
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            DEPLOY_PATH="${{ secrets.SSH_DEPLOY_PATH }}"

            # Fijar permisos del frontend para Nginx
            chmod -R 755 "$DEPLOY_PATH"
            find "$DEPLOY_PATH" -type f -name "*.html" -exec chmod 644 {} \;
            find "$DEPLOY_PATH" -type f -name "*.js" -exec chmod 644 {} \;
            find "$DEPLOY_PATH" -type f -name "*.css" -exec chmod 644 {} \;

            # Configurar backend .env
            echo "PORT=8084" > "$DEPLOY_PATH/server/.env"
            echo "DB_HOST=localhost" >> "$DEPLOY_PATH/server/.env"
            echo "DB_PORT=5432" >> "$DEPLOY_PATH/server/.env"
            echo "DB_NAME=semi1_primiparada_prod" >> "$DEPLOY_PATH/server/.env"
            echo "DB_USER=semi1_primiparada" >> "$DEPLOY_PATH/server/.env"
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> "$DEPLOY_PATH/server/.env"
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> "$DEPLOY_PATH/server/.env"

            # Instalar deps del backend
            cd "$DEPLOY_PATH/server"
            npm install --production 2>/dev/null || true

            # Reiniciar servicio (systemd configurado por el admin)
            sudo systemctl restart primiparada.service
