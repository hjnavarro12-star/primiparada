name: Deploy to Subdomain

on:
  push:
    branches:
      - production

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run build

      - name: Deploy frontend
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "dist/primiparada/browser"
          target: ${{ secrets.SSH_DEPLOY_PATH }}/frontend-tmp
          strip_components: 2
          rm: true

      - name: Deploy backend
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "server/src,server/package.json,server/package-lock.json,server/schema.sql"
          target: ${{ secrets.SSH_DEPLOY_PATH }}/server
          strip_components: 1
          rm: true

      - name: Setup and restart
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            DEPLOY_PATH="${{ secrets.SSH_DEPLOY_PATH }}"
            rm -rf "$DEPLOY_PATH/frontend"
            mv "$DEPLOY_PATH/frontend-tmp" "$DEPLOY_PATH/frontend"

            cat > "$DEPLOY_PATH/server/.env" <<'ENVEOF'
PORT=8084
DB_HOST=localhost
DB_PORT=5432
DB_NAME=semi1_primiparada_prod
DB_USER=semi1_primiparada
DB_PASSWORD=${{ secrets.DB_PASSWORD }}
JWT_SECRET=${{ secrets.JWT_SECRET }}
ENVEOF

            cd "$DEPLOY_PATH/server"
            npm install --production 2>/dev/null || true
            PGPASSWORD="${{ secrets.DB_PASSWORD }}" psql -h localhost -U semi1_primiparada -d semi1_primiparada_prod -f schema.sql 2>/dev/null || true
            pm2 delete primiparada 2>/dev/null || true
            pm2 start src/index.js --name primiparada
            pm2 save 2>/dev/null || true
