<ion-app>
  <!-- Menú lateral (hamburguesa) — solo visible si autenticado -->
  <ion-menu contentId="main-content" side="start" [disabled]="!isSignedIn()">
    <ion-header>
      <ion-toolbar>
        <ion-title>Primiparada</ion-title>
      </ion-toolbar>
    </ion-header>
    <ion-content>
      <ion-list lines="none">
        @for (section of navSections; track section.label) {
          @if (section.route) {
            <!-- Item directo sin children -->
            <ion-item button (click)="navigateTo(section.route)" detail="false">
              <ion-icon [name]="section.icon" slot="start"></ion-icon>
              <ion-label>{{ section.label }}</ion-label>
            </ion-item>
          } @else {
            <!-- Sección expandible con children -->
            <ion-item button (click)="toggleSection(section.label)" detail="false">
              <ion-icon [name]="section.icon" slot="start"></ion-icon>
              <ion-label>{{ section.label }}</ion-label>
              <ion-icon
                [name]="expandedSection() === section.label ? 'chevron-down-outline' : 'chevron-forward-outline'"
                slot="end"
                class="expand-icon"
              ></ion-icon>
            </ion-item>

            @if (expandedSection() === section.label) {
              <div class="sub-items">
                @for (child of section.children; track child.route) {
                  <ion-item button (click)="navigateTo(child.route)" detail="false" class="sub-item">
                    <ion-label>{{ child.label }}</ion-label>
                  </ion-item>
                }
              </div>
            }
          }
        }
      </ion-list>

      <!-- Cerrar sesión — siempre al final, separado -->
      <ion-list lines="none" class="ion-margin-top">
        <ion-item button (click)="logout()" detail="false">
          <ion-icon name="log-out-outline" slot="start" color="danger"></ion-icon>
          <ion-label color="danger">Cerrar sesión</ion-label>
        </ion-item>
      </ion-list>
    </ion-content>
  </ion-menu>

  <ion-router-outlet id="main-content"></ion-router-outlet>
</ion-app>
