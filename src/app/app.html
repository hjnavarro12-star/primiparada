<!-- Backdrop for mobile sidebar -->
@if (showSidebar() && sidebarOpen()) {
  <div class="sidebar-backdrop" (click)="closeSidebar()"></div>
}

<div class="app-shell" [ngClass]="{ 'has-sidebar': showSidebar() }">
  <!-- Header: visible on authenticated routes for mobile toggle -->
  @if (showSidebar()) {
    <header class="app-header">
      <button
        class="menu-toggle"
        (click)="toggleSidebar()"
        aria-label="Abrir menú de navegación"
        [attr.aria-expanded]="sidebarOpen()"
      >
        <span class="hamburger-icon"></span>
      </button>
      <h1 class="app-title">Primiparada</h1>
    </header>
  }

  <!-- Sidebar navigation -->
  @if (showSidebar()) {
    <aside class="app-sidebar" [ngClass]="{ open: sidebarOpen() }">
      <div class="sidebar-brand">
        <p class="sidebar-eyebrow">Primíparos de la UnPa</p>
        <h2 class="sidebar-title">Primiparada</h2>
      </div>

      <nav class="sidebar-nav" aria-label="Navegación principal">
        @for (item of navItems; track item.route) {
          <a
            class="nav-link"
            [routerLink]="item.route"
            routerLinkActive="active"
            (click)="closeSidebar()"
          >
            <span class="nav-icon">{{ item.icon }}</span>
            <span class="nav-label">{{ item.label }}</span>
          </a>
        }
      </nav>

      <div class="sidebar-footer">
        <button class="logout-btn" (click)="logout()">
          <span class="nav-icon">🚪</span>
          <span class="nav-label">Cerrar sesión</span>
        </button>
      </div>
    </aside>
  }

  <!-- Main content -->
  <main class="app-main">
    <router-outlet />
  </main>
</div>
