<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle with institutional gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a709c"/>
      <stop offset="100%" stop-color="#3fa779"/>
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>
  <!-- Letter P stylized -->
  <text x="32" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff">P</text>
  <!-- Navigation pin accent -->
  <circle cx="44" cy="18" r="6" fill="#e8c843"/>
  <path d="M44 24 L44 28" stroke="#e8c843" stroke-width="2" stroke-linecap="round"/>
</svg>
